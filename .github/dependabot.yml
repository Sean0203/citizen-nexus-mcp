version: 2
updates:
  # npm dependencies (package.json / package-lock.json)
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "master"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: chore
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      # One PR for routine minor/patch bumps; majors still come as separate PRs.
      npm-minor-patch:
        applies-to: "version-updates"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # @types/node major version tracks the Node.js major version; stay on the
      # LTS line (engines.node in package.json) instead of jumping to Current.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # openapi-typescript peer-depends on typescript@^5.x; TS 6 breaks npm
      # install (ERESOLVE) until it publishes a compatible release.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # GitHub Actions used in workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "master"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
