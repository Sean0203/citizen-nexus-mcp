version: 2
updates:
  # npm dependencies (package.json / package-lock.json)
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "master"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: chore
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      # One PR for routine minor/patch bumps; majors still come as separate PRs.
      npm-minor-patch:
        applies-to: "version-updates"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used in workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "master"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
