name: ci.yml
on:
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node v24.16.0
        uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test